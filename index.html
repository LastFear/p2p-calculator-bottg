<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>P2P Калькулятор</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --app-bg: #050508;
    --app-bg-soft: #0b0d12;
    --app-panel: #12151d;
    --app-panel-strong: #171b25;
    --app-text: #f6f7fb;
    --app-muted: rgba(246, 247, 251, 0.66);
    --app-border: rgba(255, 255, 255, 0.1);
    --app-green: #32f5a3;
    --app-purple: #8e5cff;
    --app-blue: #4ba3ff;
    --app-danger: #ff5f7e;
    --app-gradient: linear-gradient(135deg, rgba(50, 245, 163, 0.95), rgba(142, 92, 255, 0.9));
    --app-gradient-soft: linear-gradient(135deg, rgba(50, 245, 163, 0.22), rgba(142, 92, 255, 0.24));
  }
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
  body {
    background:
      radial-gradient(circle at top left, rgba(50, 245, 163, 0.12), transparent 32%),
      radial-gradient(circle at top right, rgba(142, 92, 255, 0.16), transparent 34%),
      var(--app-bg);
    color: var(--app-text);
    padding: 16px;
    padding-bottom: 82px;
    user-select: none;
  }
  
  /* Убираем стрелочки у всех числовых полей */
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input[type="number"] {
    -moz-appearance: textfield;
    appearance: textfield;
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--app-gradient-soft), var(--app-panel);
    border: 1px solid rgba(255, 255, 255, 0.12);
    box-shadow: 0 10px 28px rgba(0, 0, 0, 0.34), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    padding: 14px;
    border-radius: 12px;
    text-align: center;
  }
  .stat-card:nth-child(2n) {
    background: linear-gradient(135deg, rgba(142, 92, 255, 0.27), rgba(50, 245, 163, 0.18)), var(--app-panel);
  }
  .stat-label { font-size: 12px; color: var(--app-muted); margin-bottom: 4px; }
  .stat-value { font-size: 18px; font-weight: bold; color: var(--app-text); }
  .profit-positive { color: var(--app-green); }
  .profit-negative { color: var(--app-danger); }
  .stats-filter {
    display: flex;
    gap: 5px;
    overflow-x: auto;
    margin-bottom: 10px;
    padding-bottom: 2px;
  }
  .stats-filter button {
    flex: 0 0 auto;
    padding: 7px 10px;
    border: none;
    border-radius: 8px;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    background: rgba(255, 255, 255, 0.07);
    color: var(--app-muted);
    border: 1px solid var(--app-border);
  }
  .stats-filter button.active {
    background: var(--app-gradient);
    color: #07100d;
    border-color: transparent;
    box-shadow: 0 8px 18px rgba(50, 245, 163, 0.13);
  }

  .mode-buttons {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }
  .mode-main {
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    background: var(--app-panel-strong);
    color: var(--app-text);
    border: 1px solid var(--app-border);
    transition: all 0.2s;
  }
  .mode-main.active {
    background: var(--app-gradient);
    color: #07100d;
    border-color: transparent;
  }
  .purchase-icon {
    display: inline-block;
    font-size: 0.8em;
    margin-right: 2px;
    vertical-align: 0.03em;
  }
  .mode-sub {
    display: flex;
    gap: 8px;
  }
  .mode-sub button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    background: var(--app-panel-strong);
    color: var(--app-text);
    border: 1px solid var(--app-border);
    transition: all 0.2s;
  }
  .mode-sub button.active {
    background: var(--app-gradient);
    color: #07100d;
    border-color: transparent;
  }

  .view { display: none; }
  .view.active { display: block; }

  .form { margin-bottom: 20px; }
  .input-group { margin-bottom: 12px; }
  .input-group label { display: block; font-size: 13px; margin-bottom: 6px; color: var(--app-muted); }
  .input-group input,
  .input-group select {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--app-border);
    border-radius: 10px;
    font-size: 16px;
    background: rgba(255, 255, 255, 0.06);
    color: var(--app-text);
    outline: none;
  }
  .input-group input:focus,
  .input-group select:focus {
    border-color: rgba(50, 245, 163, 0.65);
    box-shadow: 0 0 0 3px rgba(50, 245, 163, 0.12);
  }

  .bank-warning {
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 12px;
    display: none;
    line-height: 1.5;
  }
  .bank-warning.show { display: block; }
  .warning-red { background: rgba(255, 95, 126, 0.18); color: #ffb0bf; border: 1px solid rgba(255, 95, 126, 0.28); }
  .warning-yellow { background: rgba(255, 210, 77, 0.18); color: #ffe28a; border: 1px solid rgba(255, 210, 77, 0.28); }
  .warning-green { background: rgba(50, 245, 163, 0.15); color: #a8ffd7; border: 1px solid rgba(50, 245, 163, 0.25); }

  .rate-preview {
    font-size: 13px;
    color: var(--app-muted);
    margin-bottom: 12px;
    text-align: center;
  }
  .btn-add {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--app-gradient);
    color: #07100d;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }
  .btn-edit {
    padding: 4px 12px;
    border: none;
    border-radius: 6px;
    background: rgba(142, 92, 255, 0.85);
    color: #fff;
    font-size: 12px;
    cursor: pointer;
    margin-right: 4px;
  }
  .btn-save-edit {
    padding: 4px 12px;
    border: none;
    border-radius: 6px;
    background: var(--app-green);
    color: #07100d;
    font-size: 12px;
    cursor: pointer;
    margin-right: 4px;
  }
  .btn-cancel-edit {
    padding: 4px 12px;
    border: none;
    border-radius: 6px;
    background: var(--app-danger);
    color: #fff;
    font-size: 12px;
    cursor: pointer;
    margin-right: 4px;
  }

  .section-title {
    font-size: 16px;
    font-weight: bold;
    margin: 20px 0 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--app-text);
  }
  .turnover-display {
    font-size: 14px;
    font-weight: normal;
    opacity: 0.8;
  }
  .bank-balance-summary {
    text-align: right;
    font-size: 12px;
    font-weight: normal;
    line-height: 1.25;
    opacity: 0.75;
  }
  .bank-balance-summary strong {
    display: block;
    font-size: 13px;
    opacity: 1;
  }

  .sort-controls {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 12px;
  }
  .sort-btn {
    padding: 6px 14px;
    border: 1px solid var(--app-border);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.06);
    color: var(--app-text);
    font-size: 13px;
    cursor: pointer;
  }
  .sort-btn:hover {
    background: rgba(255, 255, 255, 0.1);
  }

  .bank-card,
  .bank-stat {
    background: linear-gradient(135deg, rgba(50, 245, 163, 0.12), rgba(142, 92, 255, 0.1)), var(--app-panel);
    border: 1px solid var(--app-border);
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 8px;
  }
  
  .bank-card-header,
  .bank-stat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    font-size: 15px;
    gap: 8px;
  }
  .bank-name-wrapper {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    min-width: 0;
  }
  .bank-move-btns {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex-shrink: 0;
  }
  .bank-move-btn {
    background: transparent;
    border: none;
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 14px;
    cursor: pointer;
    color: var(--app-muted);
    opacity: 0.5;
    transition: opacity 0.2s;
    line-height: 1;
  }
  .bank-move-btn:active {
    opacity: 1;
  }
  .bank-move-btn:disabled {
    opacity: 0.2;
    pointer-events: none;
  }
  .bank-name {
    flex: 1;
    min-width: 0;
    word-break: break-word;
  }
  .bank-badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 8px;
    font-weight: normal;
    white-space: nowrap;
  }
  .badge-ok { background: rgba(50, 245, 163, 0.18); color: var(--app-green); }
  .badge-warn { background: rgba(255, 210, 77, 0.18); color: #ffd24d; }
  .badge-danger { background: rgba(255, 95, 126, 0.18); color: var(--app-danger); }
  .bank-delete {
    background: none;
    border: none;
    color: var(--app-danger);
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
  }

  .bank-card-sub,
  .bank-stat-sub {
    font-size: 12px;
    color: var(--app-muted);
    margin-top: 6px;
    line-height: 1.4;
  }
  .bank-balance-input {
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .bank-balance-input label {
    font-size: 12px;
    color: var(--app-muted);
    white-space: nowrap;
  }
  .bank-balance-input input {
    flex: 1;
    padding: 6px 10px;
    border: 1px solid var(--app-border);
    border-radius: 6px;
    font-size: 14px;
    background: rgba(255, 255, 255, 0.06);
    color: var(--app-text);
    width: 100%;
  }

  .deal {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 8px;
    background: var(--app-panel);
    border: 1px solid var(--app-border);
  }
  .deal-buy { border-left: 4px solid var(--app-green); }
  .deal-sell { border-left: 4px solid var(--app-danger); }
  .deal-deposit { border-left: 4px solid #f39c12; }
  .deal-info { font-size: 14px; flex: 1; }
  .deal-sub { font-size: 12px; opacity: 0.6; margin-top: 2px; }
  .deal-bank { font-size: 12px; color: var(--app-blue); margin-top: 2px; }
  .deal-actions { display: flex; gap: 4px; align-items: center; }
  .deal-delete {
    background: none;
    border: none;
    color: var(--app-danger);
    font-size: 20px;
    cursor: pointer;
    padding: 0 4px;
  }
  .deal-edit-date {
    font-size: 11px;
    padding: 2px 6px;
    border: 1px solid var(--app-border);
    border-radius: 4px;
    background: var(--app-bg-soft);
    color: var(--app-text);
    width: 100px;
  }
  .deal-time-since {
    font-size: 11px;
    opacity: 0.6;
    margin-top: 2px;
    color: var(--app-blue);
  }
  .deal-time-since.warning {
    color: var(--app-danger);
  }
  .deal-time-since.ok {
    color: var(--app-green);
  }

  .bottom-nav {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: rgba(5, 5, 8, 0.92);
    border-top: 1px solid var(--app-border);
    backdrop-filter: blur(14px);
    z-index: 10;
  }
  .bottom-nav button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.07);
    color: var(--app-muted);
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
  }
  .bottom-nav button.active {
    background: var(--app-gradient);
    color: #07100d;
  }

  .empty { text-align: center; color: var(--app-muted); padding: 20px; }
  
  .editing {
    background: var(--app-gradient);
    color: #07100d;
  }
</style>
</head>
<body>

<!-- Верхние карточки статистики -->
<div class="stats-filter">
  <button class="active" id="periodAll" onclick="setStatsPeriod('all')">Всё время</button>
  <button id="periodYear" onclick="setStatsPeriod('year')">Год</button>
  <button id="periodMonth" onclick="setStatsPeriod('month')">Месяц</button>
  <button id="periodWeek" onclick="setStatsPeriod('week')">Неделя</button>
  <button id="periodToday" onclick="setStatsPeriod('today')">Сегодня</button>
</div>
<div class="stats">
  <div class="stat-card">
    <div class="stat-label">💰 Прибыль</div>
    <div class="stat-value" id="profit">0 ₽</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">📊 Оборот</div>
    <div class="stat-value" id="turnover">0 ₽</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">🪙 Баланс USDT</div>
    <div class="stat-value" id="balanceUsdt">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">💵 Баланс ₽</div>
    <div class="stat-value" id="balanceRub">0 ₽</div>
  </div>
</div>

<!-- Вкладка "Сделки" -->
<div class="view active" id="tradeView">
  <div class="mode-buttons">
    <button class="mode-main active" id="modeBuy" onclick="setMode('buy')"><span class="purchase-icon">📥</span>Покупка</button>
    <div class="mode-sub">
      <button id="modeSell" onclick="setMode('sell')">📤 Продажа</button>
      <button id="modeDeposit" onclick="setMode('deposit')">💰 Бонусы</button>
    </div>
  </div>

  <div class="form">
    <div class="input-group" id="rubGroup">
      <label id="labelRub">Потратил рублей</label>
      <input type="number" id="inputRub" placeholder="0" value="0" 
             onfocus="this.select()" oninput="updateRate(); checkBank();" 
             onkeydown="if(event.key==='Enter'){event.preventDefault(); this.blur();}"
             enterkeyhint="done" inputmode="numeric">
    </div>
    <div class="input-group">
      <label id="labelUsdt">Количество USDT</label>
      <input type="number" id="inputUsdt" placeholder="0" value="0" 
             onfocus="this.select()" oninput="updateRate()" 
             onkeydown="if(event.key==='Enter'){event.preventDefault(); this.blur();}"
             enterkeyhint="done" inputmode="numeric">
    </div>

    <div class="input-group" id="bankGroup" style="display:none;">
      <label>🏦 Банк для продажи</label>
      <select id="inputBank" onchange="checkBank()"></select>
    </div>

    <div class="bank-warning" id="bankWarning"></div>

    <div class="rate-preview" id="ratePreview">Курс: —</div>
    <button class="btn-add" onclick="addDeal(); blurActiveElement();">Добавить сделку</button>
  </div>
</div>

<!-- Вкладка "История" -->
<div class="view" id="historyView">
  <div class="section-title">📜 История сделок</div>
  <div class="sort-controls">
    <button class="sort-btn" id="sortBtn" onclick="toggleSortOrder()">⬇️ Сортировка: новые сверху</button>
  </div>
  <div id="history"></div>
</div>

<!-- Вкладка "Банки" -->
<div class="view" id="banksView">
  <div class="section-title">
    <span>🏦 Мои банки</span>
    <span class="bank-balance-summary">Баланс<strong id="bankBalanceSummary">0 ₽</strong></span>
  </div>

  <div class="form">
    <div class="input-group">
      <label>Название банка</label>
      <input type="text" id="newBankName" placeholder="Например: Сбер" 
             onkeydown="if(event.key==='Enter'){event.preventDefault(); addBank();}"
             enterkeyhint="done">
    </div>
    <button class="btn-add" onclick="addBank(); blurActiveElement();">Добавить банк</button>
  </div>

  <div id="banksList"></div>

  <div id="bankStatsSection">
    <div class="section-title">📊 Банки сегодня</div>
    <div id="bankStats"></div>
  </div>
</div>

<!-- Нижняя навигация -->
<div class="bottom-nav">
  <button class="active" id="bottomTrade" onclick="switchPage('trade')">💱 Сделки</button>
  <button id="bottomHistory" onclick="switchPage('history')">📜 История</button>
  <button id="bottomBanks" onclick="switchPage('banks')">🏦 Банки</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// ---- Скрытие клавиатуры на iPhone ----
function blurActiveElement() {
  if (document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT')) {
    document.activeElement.blur();
  }
}

// Глобальный обработчик на touchstart и click
document.addEventListener('touchstart', function(e) {
  const target = e.target;
  if (target.tagName !== 'INPUT' && target.tagName !== 'SELECT' && target.tagName !== 'BUTTON') {
    blurActiveElement();
  }
});
document.addEventListener('click', function(e) {
  const target = e.target;
  if (target.tagName !== 'INPUT' && target.tagName !== 'SELECT' && target.tagName !== 'BUTTON') {
    blurActiveElement();
  }
});

// ---- Остальные глобальные переменные ----
const LIMIT_DAILY = 100000;
const LIMIT_BIG = 40000;
const MAX_BIG_DEALS = 1;
const HEAT_WARN_PERCENT = 70;

let currentMode = 'buy';
let currentPage = 'trade';
let deals = [];
let banks = [];
let editingDealId = null;
let sortDesc = true;
let currentStatsPeriod = 'all';
const STORAGE_CHUNK_SIZE = 3000;

// ---- Функции перемещения банков (кнопки) ----
function moveBank(id, direction) {
  const index = banks.findIndex(b => b.id === id);
  if (index === -1) return;
  const newIndex = index + direction;
  if (newIndex < 0 || newIndex >= banks.length) return;
  const [bank] = banks.splice(index, 1);
  banks.splice(newIndex, 0, bank);
  saveData();
  renderBanksList();
  renderBankOptions();
  renderBankStats();
  updateStats();
}

// ---- Установка режима ----
function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeBuy').classList.toggle('active', mode === 'buy');
  document.getElementById('modeSell').classList.toggle('active', mode === 'sell');
  document.getElementById('modeDeposit').classList.toggle('active', mode === 'deposit');

  const rubGroup = document.getElementById('rubGroup');
  const bankGroup = document.getElementById('bankGroup');
  const rubLabel = document.getElementById('labelRub');
  const usdtLabel = document.getElementById('labelUsdt');
  const warningEl = document.getElementById('bankWarning');
  const ratePreview = document.getElementById('ratePreview');

  warningEl.classList.remove('show');

  if (mode === 'deposit') {
    rubGroup.style.display = 'none';
    bankGroup.style.display = 'none';
    ratePreview.textContent = '💰 Пополнение баланса USDT';
    usdtLabel.textContent = 'Количество USDT (бонус)';
  } else if (mode === 'buy') {
    rubGroup.style.display = 'block';
    bankGroup.style.display = 'none';
    rubLabel.textContent = 'Потратил рублей';
    usdtLabel.textContent = 'Получил USDT';
    updateRate();
  } else { // sell
    rubGroup.style.display = 'block';
    bankGroup.style.display = 'block';
    rubLabel.textContent = 'Получил рублей';
    usdtLabel.textContent = 'Отдал USDT';
    renderBankOptions();
    updateRate();
    checkBank();
  }
}

// ---- Переключение страниц ----
function switchPage(page) {
  currentPage = page;
  const isTrade = page === 'trade';
  const isHistory = page === 'history';
  const isBanks = page === 'banks';

  document.getElementById('tradeView').classList.toggle('active', isTrade);
  document.getElementById('historyView').classList.toggle('active', isHistory);
  document.getElementById('banksView').classList.toggle('active', isBanks);

  document.getElementById('bottomTrade').classList.toggle('active', isTrade);
  document.getElementById('bottomHistory').classList.toggle('active', isHistory);
  document.getElementById('bottomBanks').classList.toggle('active', isBanks);

  if (isTrade) {
    renderBankOptions();
  } else if (isHistory) {
    renderHistory();
  } else if (isBanks) {
    renderBanksList();
    renderBankStats();
  }
  blurActiveElement();
  updateStats();
}

// ---- Сортировка истории ----
function toggleSortOrder() {
  sortDesc = !sortDesc;
  document.getElementById('sortBtn').textContent = sortDesc ? '⬇️ Сортировка: новые сверху' : '⬆️ Сортировка: старые сверху';
  renderHistory();
}

function setStatsPeriod(period) {
  currentStatsPeriod = period;
  ['all', 'year', 'month', 'week', 'today'].forEach(key => {
    const btn = document.getElementById('period' + key.charAt(0).toUpperCase() + key.slice(1));
    if (btn) btn.classList.toggle('active', key === period);
  });
  updateStats();
}

function resetTradeForm() {
  document.getElementById('inputRub').value = '0';
  document.getElementById('inputUsdt').value = '0';
  document.getElementById('bankWarning').classList.remove('show');
  updateRate();
}

function updateRate() {
  if (currentMode === 'deposit') {
    document.getElementById('ratePreview').textContent = '💰 Пополнение баланса USDT';
    return;
  }
  const rub = parseFloat(document.getElementById('inputRub').value) || 0;
  const usdt = parseFloat(document.getElementById('inputUsdt').value) || 0;
  if (rub > 0 && usdt > 0) {
    document.getElementById('ratePreview').textContent = `Курс: ${(rub/usdt).toFixed(2)} ₽/USDT`;
  } else {
    document.getElementById('ratePreview').textContent = 'Курс: —';
  }
}

// ---- Банки ----
function addBank() {
  const input = document.getElementById('newBankName');
  const name = input.value.trim();
  if (!name) { tg.showAlert('Введи название банка!'); return; }
  if (banks.some(b => b.name.toLowerCase() === name.toLowerCase())) {
    tg.showAlert('Такой банк уже есть!');
    return;
  }
  banks.push({ id: Date.now(), name, balance: 0 });
  input.value = '';
  saveData();
  renderBankOptions();
  renderBanksList();
  renderBankStats();
  updateStats();
  blurActiveElement();
}

function deleteBank(id) {
  const bank = banks.find(b => b.id === id);
  if (!bank) return;
  if (deals.some(d => d.bank && d.bank.toLowerCase() === bank.name.toLowerCase())) {
    tg.showAlert('Этот банк уже есть в истории сделок, его нельзя удалить.');
    return;
  }
  tg.showConfirm('Удалить банк?', (ok) => {
    if (ok) {
      banks = banks.filter(b => b.id !== id);
      saveData();
      renderBankOptions();
      renderBanksList();
      renderBankStats();
      updateStats();
    }
  });
}

// ОБНОВЛЕННАЯ функция обновления остатка - без перерисовки списка
function updateBankBalance(id, value) {
  const bank = banks.find(b => b.id === id);
  if (!bank) return;
  const num = parseFloat(value) || 0;
  bank.balance = num;
  saveData();
  // Обновляем только статистику, не трогая список банков
  updateStats();

  // Можно также синхронизировать другие вкладки, но они не показывают остатки напрямую.
}

// Новая функция обновления статистики (без перерисовки списка банков)
function updateStats() {
  const stats = calculate(currentStatsPeriod);
  document.getElementById('profit').textContent = formatRub(stats.profit);
  document.getElementById('profit').className = 'stat-value ' + (stats.profit >= 0 ? 'profit-positive' : 'profit-negative');
  document.getElementById('turnover').textContent = formatRub(stats.turnover);
  document.getElementById('balanceUsdt').textContent = stats.balanceUsdt.toFixed(2);
  document.getElementById('balanceRub').textContent = formatRub(stats.balanceRub);

function renderBankOptions() {
  const select = document.getElementById('inputBank');
  if (!banks.length) {
    select.innerHTML = '<option value="">Сначала добавь банк внизу: Банки</option>';
    return;
  }
  select.innerHTML = '<option value="">Выбери банк</option>' +
    banks.map(b => {
      const heat = getBankHeat(b.name);
      return `<option value="${escapeHtml(b.name)}">${escapeHtml(b.name)} — ${heat.label}</option>`;
    }).join('');
}

function checkBank() {
  if (currentMode !== 'sell') return;
  const bankName = document.getElementById('inputBank').value;
  const warningEl = document.getElementById('bankWarning');
  const currentRub = parseFloat(document.getElementById('inputRub').value) || 0;
  if (!bankName) { warningEl.classList.remove('show'); return; }

  const heat = getBankHeat(bankName, currentRub);
  const msgs = [];
  if (heat.totalWithCurrent > LIMIT_DAILY) {
    msgs.push(`🔴 Перегрев счёта! На «${bankName}» за день будет ${formatRub(heat.totalWithCurrent)} из ${formatRub(LIMIT_DAILY)}`);
  } else if (heat.percentWithCurrent >= HEAT_WARN_PERCENT) {
    msgs.push(`🟡 Банк близко к перегреву: ${heat.percentWithCurrent}% дневного лимита`);
  }
  if (heat.bigWithCurrent > MAX_BIG_DEALS) {
    msgs.push(`🟡 Много крупных сделок: ${heat.bigWithCurrent} сделок свыше ${formatRub(LIMIT_BIG)}`);
  }
  if (!msgs.length && heat.count > 0) {
    msgs.push(`✅ По банку «${bankName}» сегодня ${heat.count} сделок на ${formatRub(heat.total)}`);
  }
  if (msgs.length) {
    warningEl.innerHTML = msgs.join('<br>');
    warningEl.className = 'bank-warning show warning-' + heat.levelWithCurrent;
  } else {
    warningEl.classList.remove('show');
  }
}

// ---- Добавление сделки ----
function addDeal() {
  const usdt = parseFloat(document.getElementById('inputUsdt').value) || 0;
  let rub = parseFloat(document.getElementById('inputRub').value) || 0;
  const bank = document.getElementById('inputBank').value;

  if (usdt <= 0) {
    tg.showAlert('Укажите количество USDT больше нуля!');
    return;
  }

  if (currentMode === 'deposit') {
    rub = 0;
  } else {
    if (rub <= 0) {
      tg.showAlert('Укажите сумму рублей больше нуля!');
      return;
    }
    if (currentMode === 'sell') {
      if (!banks.length) { tg.showAlert('Сначала добавьте банк во вкладке "Банки"!'); return; }
      if (!bank) { tg.showAlert('Выберите банк для продажи!'); return; }
    }
  }

  const now = new Date();
  const deal = {
    id: Date.now(),
    type: currentMode,
    rub: rub,
    usdt: usdt,
    rate: currentMode === 'deposit' ? 0 : rub / usdt,
    date: now.toLocaleDateString('ru-RU'),
    time: now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }),
    timestamp: now.getTime()
  };
  if (currentMode === 'sell') deal.bank = bank;

  deals.push(deal);
  resetTradeForm();
  renderBankOptions();
  saveData();
  render(); // перерисовывает все вкладки, но у нас не останавливает фокус, потому что мы не вводим в тот момент
  blurActiveElement();

function saveEditDate(id) {

// ---- Вспомогательные функции ----
function getTimeSince(timestamp) {
  if (!timestamp) return '';
  const diff = Date.now() - timestamp;
  if (diff < 60000) return 'только что';
  if (diff < 3600000) return Math.floor(diff/60000) + ' мин назад';
  if (diff < 86400000) {
    const h = Math.floor(diff/3600000);
    const m = Math.floor((diff%3600000)/60000);
    return `${h} ч ${m} мин назад`;
  }
  return Math.floor(diff/86400000) + ' дн назад';
}

function getLastDealTime(bankName) {
  const filtered = deals
    .filter(d => d.type === 'sell' && d.bank && d.bank.toLowerCase() === bankName.toLowerCase())
    .sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
  return filtered.length ? filtered[0].timestamp : null;
}

function getBankHeat(bankName, currentRub = 0) {
  const today = new Date().toLocaleDateString('ru-RU');
  const todaySells = deals.filter(d =>
    d.type === 'sell' && d.bank && d.bank.toLowerCase() === bankName.toLowerCase() && d.date === today
  );
  const total = todaySells.reduce((s,d) => s + d.rub, 0);
  const count = todaySells.length;
  const big = todaySells.filter(d => d.rub > LIMIT_BIG).length;
  const totalWithCurrent = total + currentRub;
  const bigWithCurrent = big + (currentRub > LIMIT_BIG ? 1 : 0);
  const percent = Math.round((total / LIMIT_DAILY) * 100);
  const percentWithCurrent = Math.round((totalWithCurrent / LIMIT_DAILY) * 100);

  let level = 'green', label = `OK ${percent}%`;
  if (total > LIMIT_DAILY || big > MAX_BIG_DEALS) { level = 'red'; label = 'Перегрет'; }
  else if (percent >= HEAT_WARN_PERCENT) { level = 'yellow'; label = `Риск ${percent}%`; }

  let levelWithCurrent = 'green';
  if (totalWithCurrent > LIMIT_DAILY) levelWithCurrent = 'red';
  else if (percentWithCurrent >= HEAT_WARN_PERCENT || bigWithCurrent > MAX_BIG_DEALS) levelWithCurrent = 'yellow';

  return { total, count, big, totalWithCurrent, bigWithCurrent, percent, percentWithCurrent, level, levelWithCurrent, label };
}

function getDealTimestamp(deal) {
  if (deal.timestamp) return deal.timestamp;
  if (!deal.date) return 0;
  const parts = deal.date.split('.');
  if (parts.length !== 3) return 0;
  const dateObj = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
  if (deal.time) {
    const [h, m] = deal.time.split(':');
    dateObj.setHours(parseInt(h) || 0, parseInt(m) || 0, 0, 0);
  }
  return dateObj.getTime();
}

function getStatsPeriodRange(period) {
  const now = new Date();
  const start = new Date(now);
  start.setHours(0, 0, 0, 0);

  if (period === 'today') return { start: start.getTime(), label: 'сегодня' };

  if (period === 'week') {
    const day = start.getDay() || 7;
    start.setDate(start.getDate() - day + 1);
    return { start: start.getTime(), label: 'неделя' };
  }

  if (period === 'month') {
    start.setDate(1);
    return { start: start.getTime(), label: 'месяц' };
  }

  if (period === 'year') {
    start.setMonth(0, 1);
    return { start: start.getTime(), label: 'год' };
  }

  return { start: null, label: 'всё время' };
}

function isDealInPeriod(deal, periodStart) {
  return periodStart === null || getDealTimestamp(deal) >= periodStart;
}

// ---- Расчёт статистики с учётом фильтра периода ----
function calculate(period = 'all') {
  const periodInfo = getStatsPeriodRange(period);
  const periodStart = periodInfo.start;
  const sortedDeals = [...deals].sort((a, b) => getDealTimestamp(a) - getDealTimestamp(b));
  let buyQueue = [];
  let totalProfit = 0;
  let periodBuyRub = 0, periodSellRub = 0;
  let currentBuyRub = 0, currentSellRub = 0;
  let currentBuyUsdt = 0, currentSellUsdt = 0;
  let currentDepositUsdt = 0;

  sortedDeals.forEach(d => {
    const inPeriod = isDealInPeriod(d, periodStart);

    if (d.type === 'buy') {
      buyQueue.push({ usdt: d.usdt, rate: d.rate });
      currentBuyRub += d.rub;
      currentBuyUsdt += d.usdt;
      if (inPeriod) {
        periodBuyRub += d.rub;
      }
    } else if (d.type === 'sell') {
      currentSellRub += d.rub;
      currentSellUsdt += d.usdt;
      if (inPeriod) {
        periodSellRub += d.rub;
      }

      let usdtToSell = d.usdt;
      const sellRate = d.rate;
      while (usdtToSell > 0 && buyQueue.length) {
        const buy = buyQueue[0];
        const used = Math.min(usdtToSell, buy.usdt);
        if (inPeriod) totalProfit += used * (sellRate - buy.rate);
        buy.usdt -= used;
        usdtToSell -= used;
        if (buy.usdt <= 0.0001) buyQueue.shift();
      }
    } else if (d.type === 'deposit') {
      currentDepositUsdt += d.usdt;
    }
  });

  const totalBankBalance = banks.reduce((sum, b) => sum + (b.balance || 0), 0);

  const balanceUsdt = currentBuyUsdt + currentDepositUsdt - currentSellUsdt;
  const balanceRub = currentSellRub - currentBuyRub + totalBankBalance;
  const turnover = periodBuyRub + periodSellRub;

  return { profit: totalProfit, balanceUsdt, balanceRub, turnover, totalBankBalance, label: periodInfo.label };
}

function formatRub(n) {
  return new Intl.NumberFormat('ru-RU', { maximumFractionDigits: 0 }).format(Math.round(n)) + ' ₽';
}

function escapeHtml(v) {
  return String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
}

function cloudGetItem(key) {
  return new Promise(resolve => {
    tg.CloudStorage.getItem(key, (err, value) => {
      if (err) console.warn('CloudStorage getItem failed:', key, err);
      resolve(err ? null : value);
    });
  });
}

function cloudSetItem(key, value) {
  return new Promise(resolve => {
    tg.CloudStorage.setItem(key, value, (err) => {
      if (err) console.warn('CloudStorage setItem failed:', key, err);
      resolve(!err);
    });
  });
}

async function loadLegacyJson(key, fallback) {
  const value = await cloudGetItem(key);
  if (!value) return fallback;
  try {
    const parsed = JSON.parse(value);
    return Array.isArray(parsed) ? parsed : fallback;
  } catch (e) {
    console.warn('Legacy storage parse failed:', key, e);
    return fallback;
  }
}

async function loadJsonChunks(key, fallback) {
  const countValue = await cloudGetItem(`${key}_chunks_count`);
  const count = parseInt(countValue || '0', 10);
  if (!count || count < 1) return null;

  const chunks = await Promise.all(
    Array.from({ length: count }, (_, index) => cloudGetItem(`${key}_chunk_${index}`))
  );
  if (chunks.some(chunk => chunk === null || chunk === undefined)) return fallback;

  try {
    const parsed = JSON.parse(chunks.join(''));
    return Array.isArray(parsed) ? parsed : fallback;
  } catch (e) {
    console.warn('Chunked storage parse failed:', key, e);
    return fallback;
  }
}

async function saveJsonChunks(key, value) {
  const text = JSON.stringify(value);
  const chunks = [];
  for (let i = 0; i < text.length; i += STORAGE_CHUNK_SIZE) {
    chunks.push(text.slice(i, i + STORAGE_CHUNK_SIZE));
  }

  const saved = await Promise.all(
    chunks.map((chunk, index) => cloudSetItem(`${key}_chunk_${index}`, chunk))
  );
  if (saved.some(ok => !ok)) {
    tg.showAlert('Не удалось сохранить данные. Проверьте интернет и попробуйте ещё раз.');
    return false;
  }

  await cloudSetItem(`${key}_chunks_count`, String(chunks.length));
  return true;
}

function saveData() {
  saveJsonChunks('deals', deals);
  saveJsonChunks('banks', banks);
}

async function loadData() {
  const chunkedDeals = await loadJsonChunks('deals', []);
  const chunkedBanks = await loadJsonChunks('banks', []);

  deals = chunkedDeals || await loadLegacyJson('deals', []);
  banks = chunkedBanks || await loadLegacyJson('banks', []);

  banks = normalizeBanks(banks);
  saveData();
  render();
}

function normalizeBanks(saved) {
  const result = [];
  saved.forEach(b => {
    if (typeof b === 'string') addNormalizedBank(result, b);
    else if (b && b.name) {
      addNormalizedBank(result, b.name, b.id, b.balance);
    }
  });
  deals.forEach(d => { if (d.bank) addNormalizedBank(result, d.bank); });
  return result;
}
function addNormalizedBank(list, name, id, balance) {
  const clean = String(name).trim();
  if (!clean) return;
  let existing = list.find(b => b.name.toLowerCase() === clean.toLowerCase());
  if (existing) {
    if (existing.balance === undefined && balance !== undefined) {
      existing.balance = balance;
    }
    return;
  }
  list.push({ id: id || Date.now() + Math.random(), name: clean, balance: balance || 0 });
}

setInterval(() => {
  if (currentPage === 'banks') {
    renderBanksList();
    renderBankStats();
  } else if (currentPage === 'history') {

}, 60000);
